name: Refresh Blog Pages

on:
  repository_dispatch:
    types: [refresh-blog]
  push:
    branches:
      - main

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog-pages repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Refresh GitHub Pages
        run: |
          # Just make a small change to trigger a rebuild
          echo "Refreshed at $(date)" >> .refresh-log
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .refresh-log
          git commit -m "Refresh blog pages" || echo "No changes to commit"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main || echo "Failed to push changes"