<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GitHub OAuth 回调</title>
  <link rel="stylesheet" href="style.css">
  <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        background-color: #f5f5f5;
      }
      
      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(0,0,0,0.1);
        text-align: center;
      }
      
      h1 {
        color: #2c3e50;
        margin-bottom: 10px;
      }
      
      .status {
        font-size: 1.1em;
        margin: 20px 0;
      }
      
      .loading {
        color: #3498db;
      }
      
      .success {
        color: #27ae60;
      }
      
      .error {
        color: #e74c3c;
      }
      
      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #3498db;
        text-decoration: none;
      }
      
      .back-link:hover {
        text-decoration: underline;
      }
      
      footer {
        margin-top: 30px;
        color: #7f8c8d;
        font-size: 0.9em;
      }
    </style>
</head>
<body>
  <header class="site-header">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
      <h1 style="margin: 0; font-size: 1.5rem;">GitHub OAuth 回调</h1>
      <div>
        <a href="../index.html" style="text-decoration: none; margin-left: 10px;">← 返回首页</a>
      </div>
    </div>
  </header>
  <div class="container callback-panel">
    <h2>GitHub OAuth 回调处理中</h2>
    <div class="loading">正在处理登录信息，请稍候...</div>
    <div id="result"></div>
  </div>

  <script>
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
      // 从URL参数中获取授权码和state
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const state = decodeURIComponent(urlParams.get('state') || '');
      const error = urlParams.get('error');
      
      // 显示处理状态
      const statusDiv = document.getElementById('status');
      
      if (error) {
        statusDiv.innerHTML = `<div class="error">OAuth错误: ${error}</div>`;
        return;
      }
      
      if (!code) {
        statusDiv.innerHTML = '<div class="error">错误：未收到授权码</div>';
        return;
      }
      
      // 获取来源页面URL
      const redirectUrl = state || '../index.html';
      
      statusDiv.innerHTML = '<div class="loading">正在处理登录...</div>';
      
      // 构建请求参数
      const clientId = 'Ov23li6xfHAMPQC60yFb'; // 替换为你的 GitHub OAuth App Client ID
      const clientSecret = 'a786fea7a10095a6318d742adcd221b8593d1603'; // 替换为你的 GitHub OAuth App Client Secret
      const redirectUri = window.location.origin + '/pages/github-oauth-callback.html';
      
      // 构建POST请求体
      const requestBody = new URLSearchParams();
      requestBody.append('client_id', clientId);
      requestBody.append('client_secret', clientSecret);
      requestBody.append('code', code);
      requestBody.append('redirect_uri', redirectUri);
      
      // 发送POST请求到GitHub OAuth访问令牌端点
      fetch('https://github.com/login/oauth/access_token', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: requestBody
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          throw new Error(data.error_description || data.error);
        }
        
        const accessToken = data.access_token;
        
        // 使用访问令牌获取用户信息
        return fetch('https://api.github.com/user', {
          headers: {
            'Authorization': `Bearer ${accessToken}`
          }
        })
        .then(response => response.json())
        .then(userInfo => {
          // 存储用户信息和访问令牌到localStorage
          localStorage.setItem('github_token', accessToken);
          localStorage.setItem('user_name', userInfo.login);
          localStorage.setItem('user_avatar', userInfo.avatar_url);
          
          // 显示成功消息
          statusDiv.innerHTML = '<div class="success">登录成功！正在跳转...</div>';
          
          // 跳转回来源页面或首页
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 1000);
        });
      })
      .catch(error => {
        console.error('OAuth错误:', error);
        statusDiv.innerHTML = `<div class="error">登录失败: ${error.message}</div>`;
      });
    });
  </script>
</body>
</html>
