<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理员登录</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6}
    .box{max-width:420px;margin:6vh auto;padding:2rem;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    h1{margin-bottom:1rem;font-size:1.25rem}
    input{width:100%;padding:0.6rem;margin-bottom:0.75rem;border:1px solid #d1d5db;border-radius:6px}
    button{padding:0.6rem 0.9rem;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .error{background:#fee2e2;padding:0.75rem;border-radius:6px;color:#7f1d1d;margin-bottom:0.75rem}
  </style>
</head>
<body>
  <div class="box">
    <h1>🛡 管理员登录</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label>用户名</label>
      <input name="username" value="admin" />
      <label>密码</label>
      <input name="password" type="password" />
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
        <a href="/" style="align-self:center;color:#6b7280;text-decoration:none">返回</a>
        <button type="submit">登录</button>
      </div>
    </form>
    <p style="margin-top:0.75rem;color:#6b7280;font-size:0.9rem">如果未设置管理员密码，请运行 <code>python scripts/set_admin_password.py</code></p>
  </div>
</body>
</html>
