<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#2563eb">
        <title>$title$</title>
        <link rel="stylesheet" href="../style.css">
        <script src="../giscus-config.js"></script>
    </head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="container">
                <div style="display: flex; justify-content: flex-end; align-items: center;">
                    <div class="controls">
                        <div id="visitor-login-btn" class="user-login-button">
                            <span class="login-text">登录</span>
                        </div>
                        <div id="user-menu" class="user-menu-dropdown" style="display: none;">
                            <div class="user-info">
                                <img id="user-avatar" src="https://avatars.githubusercontent.com/u/123456?v=4" alt="头像" class="user-avatar">
                                <span id="user-name" class="user-name">访客</span>
                            </div>
                            <div class="menu-divider"></div>
                            <a href="../pages/personal-center.html" class="menu-item">个人中心</a>
                            <button id="logout-btn" class="menu-item logout-btn">退出登录</button>
                        </div>
                    </div>
                </div>
                <a id="admin-link" href="../pages/admin.html" style="display:none;margin-left:8px;">管理员中心</a>
                <a id="admin-enhanced-link" href="../pages/admin-enhanced.html" style="display:none;margin-left:8px;">增强版管理员中心</a>
            </div>
        </header>
        <article class="post-container">
            <header class="post-hero">
                <!-- Optional cover image: set via -V cover="/path/to/cover.jpg" -->
                $if(cover)$
                    <img src="$cover$" alt="cover" class="post-cover" style="width:100%;height:auto;border-radius:10px;margin-bottom:12px;" />
                $endif$
                <h1>$title$</h1>
                <div class="post-meta">日期：<time>$date$</time> · 分类：<strong>$category$</strong></div>
                <div style="margin-top: 10px;">
                    <button id="favorite-btn">收藏文章</button>
                </div>
            </header>

            <section class="post-content">
                $body$
            </section>

            <!-- 评论区：只显示 Giscus 评论系统 -->
            <section id="comments-section">
                <h3>评论区</h3>
                <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px; margin-bottom: 16px;">欢迎在下方留下您的想法和建议</p>

                <!-- Giscus comments -->
                <div id="giscus-container">
                    <div id="giscus-root"></div>
                </div>
            </section>

            <footer style="margin-top:28px;">
                <div class="article-navigation">
                    <div class="nav-prev">
                        <a href="#" id="prev-article" class="nav-link">
                            <span class="nav-arrow">←</span>
                            <span class="nav-title" id="prev-title">上一篇文章</span>
                        </a>
                    </div>
                    <div class="nav-home">
                        <a href="../index.html" class="nav-link">返回首页</a>
                    </div>
                    <div class="nav-next">
                        <a href="#" id="next-article" class="nav-link">
                            <span class="nav-title" id="next-title">下一篇文章</span>
                            <span class="nav-arrow">→</span>
                        </a>
                    </div>
                </div>
            </footer>
        </article>
    </div>
        <script>
            // 检查用户是否已登录
            function checkLoginStatus() {
                const token = localStorage.getItem('github_token');
                const userName = localStorage.getItem('user_name');
                const userAvatar = localStorage.getItem('user_avatar');
                
                if (token && userName) {
                    // 用户已登录
                    document.getElementById('visitor-login-btn').style.display = 'none';
                    document.getElementById('user-menu').style.display = 'block';
                    document.getElementById('user-name').textContent = userName;
                    document.getElementById('user-avatar').src = userAvatar || 'https://avatars.githubusercontent.com/u/123456?v=4';
                    
                    // 检查是否为仓库所有者
                    if (userName === 'cxyqiyue') {
                        document.getElementById('admin-link').style.display = 'inline-block';
                        document.getElementById('admin-enhanced-link').style.display = 'inline-block';
                    }
                } else {
                    // 用户未登录
                    document.getElementById('visitor-login-btn').style.display = 'block';
                    document.getElementById('user-menu').style.display = 'none';
                    document.getElementById('admin-link').style.display = 'none';
                    document.getElementById('admin-enhanced-link').style.display = 'none';
                }
            }
            
            // 页面加载完成后执行
            document.addEventListener('DOMContentLoaded', function() {
                checkLoginStatus();
                
                // 绑定登录按钮事件
                document.getElementById('visitor-login-btn').addEventListener('click', function() {
                    // 优先使用 PKCE 安全登录
                    window.location.href = '../pages/github-login-pkce.html';
                });
                
                // 绑定退出登录按钮事件
                document.getElementById('logout-btn').addEventListener('click', function() {
                    localStorage.removeItem('github_token');
                    localStorage.removeItem('user_name');
                    localStorage.removeItem('user_avatar');
                    checkLoginStatus();
                    window.location.reload();
                });
                
                // 绑定返回首页按钮事件
                document.getElementById('back-to-home').addEventListener('click', function() {
                    window.location.href = '../index.html';
                });
                
                // 绑定上一篇文章按钮事件
                document.getElementById('prev-article').addEventListener('click', function() {
                    const currentUrl = window.location.pathname;
                    fetch('../articles.json')
                        .then(response => response.json())
                        .then(articles => {
                            // 按修改时间排序（从新到旧）
                            const sortedArticles = articles.sort((a, b) => {
                                const dateA = new Date(a.modifiedDate || a.date);
                                const dateB = new Date(b.modifiedDate || b.date);
                                return dateB - dateA;
                            });
                            
                            // 查找当前文章索引
                            const currentIndex = sortedArticles.findIndex(article => 
                                article.url === currentUrl.substring(1) // 去掉开头的 "/"
                            );
                            
                            // 如果找到并且不是第一篇文章，则跳转到上一篇
                            if (currentIndex > 0) {
                                window.location.href = '../' + sortedArticles[currentIndex - 1].url;
                            }
                        })
                        .catch(error => {
                            console.error('获取文章列表失败:', error);
                        });
                });
                
                // 绑定下一篇文章按钮事件
                document.getElementById('next-article').addEventListener('click', function() {
                    const currentUrl = window.location.pathname;
                    fetch('../articles.json')
                        .then(response => response.json())
                        .then(articles => {
                            // 按修改时间排序（从新到旧）
                            const sortedArticles = articles.sort((a, b) => {
                                const dateA = new Date(a.modifiedDate || a.date);
                                const dateB = new Date(b.modifiedDate || b.date);
                                return dateB - dateA;
                            });
                            
                            // 查找当前文章索引
                            const currentIndex = sortedArticles.findIndex(article => 
                                article.url === currentUrl.substring(1) // 去掉开头的 "/"
                            );
                            
                            // 如果找到并且不是最后一篇文章，则跳转到下一篇
                            if (currentIndex >= 0 && currentIndex < sortedArticles.length - 1) {
                                window.location.href = '../' + sortedArticles[currentIndex + 1].url;
                            }
                        })
                        .catch(error => {
                            console.error('获取文章列表失败:', error);
                        });
                });
            });
        </script>
        
        <!-- 悬浮按钮 -->
        <div class="floating-buttons">
          <button class="floating-btn" id="scroll-top" title="回到顶部">↑</button>
          <button class="floating-btn" id="scroll-bottom" title="前往底部">↓</button>
        </div>
        
        <script>
          // 悬浮按钮功能
          document.getElementById('scroll-top').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          
          document.getElementById('scroll-bottom').addEventListener('click', () => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
          });
        </script>
</body>
</html>
