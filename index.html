<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="index-container">
    <header><h1><a href="index.html">我的博客</a></h1></header>
    <nav class="category-nav"><a href="#" data-category="all" class="active">全部文章</a></nav>
    <main class="articles">
        <div class="loading">加载中...</div>
    </main>

    <script>
        // 异步加载 articles.json（确保路径与部署后一致）
        fetch('articles.json')
            .then(response => {
                if (!response.ok) throw new Error('加载文章失败');
                return response.json();
            })
            .then(articles => {
                const articlesContainer = document.querySelector('.articles');
                const categoryNav = document.querySelector('.category-nav');
                
                // 提取并排序所有分类（去重）
                const categories = [...new Set(articles.map(a => a.category))]
                    .sort((a, b) => a.localeCompare(b, 'zh-CN')); // 中文排序

                // 渲染分类导航
                categories.forEach(category => {
                    const a = document.createElement('a');
                    a.href = '#';
                    a.dataset.category = category;
                    a.textContent = category;
                    a.addEventListener('click', (e) => filterArticles(e, category));
                    categoryNav.appendChild(a);
                });

                // 渲染文章列表（按日期倒序）
                function renderArticles(filteredArticles) {
                    // 确保日期排序正确（处理空日期情况）
                    const sortedArticles = filteredArticles.sort((a, b) => {
                        const dateA = a.date ? new Date(a.date) : new Date(0);
                        const dateB = b.date ? new Date(b.date) : new Date(0);
                        return dateB - dateA;
                    });

                    articlesContainer.innerHTML = sortedArticles.length ? 
                        sortedArticles.map(a => `
                            <article class="article-item">
                                <h2><a href="${a.url}" target="_self">${a.title}</a></h2>
                                <div class="meta">${a.date || '未知日期'} · <strong>${a.category}</strong></div>
                                <p class="summary">${a.summary || '无摘要'}</p>
                            </article>
                        `).join('') : 
                        '<p>暂无文章</p>';
                }

                // 分类筛选逻辑
                function filterArticles(e, category) {
                    e.preventDefault();
                    // 更新活跃状态
                    document.querySelectorAll('.category-nav a').forEach(link => {
                        link.classList.toggle('active', link.dataset.category === category);
                    });
                    // 筛选文章
                    const filtered = category === 'all' 
                        ? articles 
                        : articles.filter(a => a.category === category);
                    renderArticles(filtered);
                }

                // 初始渲染所有文章
                renderArticles(articles);
            })
            .catch(error => {
                document.querySelector('.articles').innerHTML = `<p style="color: red;">${error.message}</p>`;
            });
    </script>
</body>
</html>
